name: zjh-personal-site

services:
  web:
    build:
      context: .
      target: development
    command: npm run dev -- --host 0.0.0.0 --port 4321
    init: true
    ports:
      - "4321:4321"
    environment:
      KEYSTATIC_STORAGE: ${KEYSTATIC_STORAGE:-local}
      PUBLIC_KEYSTATIC_STORAGE: ${PUBLIC_KEYSTATIC_STORAGE:-local}
      KEYSTATIC_GITHUB_CLIENT_ID: ${KEYSTATIC_GITHUB_CLIENT_ID:-}
      KEYSTATIC_GITHUB_CLIENT_SECRET: ${KEYSTATIC_GITHUB_CLIENT_SECRET:-}
      KEYSTATIC_SECRET: ${KEYSTATIC_SECRET:-}
      PUBLIC_KEYSTATIC_GITHUB_APP_SLUG: ${PUBLIC_KEYSTATIC_GITHUB_APP_SLUG:-}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-100}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - astro_cache:/app/.astro

  preview:
    profiles:
      - preview
    build:
      context: .
      target: production
    init: true
    ports:
      - "4322:4321"

volumes:
  node_modules:
  astro_cache:
