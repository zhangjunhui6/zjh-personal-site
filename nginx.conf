server {
  listen 4321;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /_astro/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /notes/git-commit-history-workflow/ {
    return 301 /notes/software/tools/git-commit-history-workflow/;
  }

  location = /notes/docker-daily-development-guide/ {
    return 301 /notes/software/devops/docker-daily-development-guide/;
  }

  location = /notes/robot-urdf-modeling-guide/ {
    return 301 /notes/robotics/ros/robot-urdf-modeling-guide/;
  }

  location / {
    try_files $uri $uri/ $uri/index.html /404.html;
  }
}
