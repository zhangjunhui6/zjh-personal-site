<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">OpenVLA architecture and action tokenization</title>
  <desc id="desc">A self-drawn diagram corresponding to OpenVLA Figure 1 and Section 3.2.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#2f5d50"/></marker>
    <style>
      .bg{fill:#fffdf8}.box{fill:#fff;stroke:#9ab5aa;stroke-width:2;rx:10}.main{fill:#eaf3f0;stroke:#2f5d50;stroke-width:2;rx:14}.tok{fill:#fff4de;stroke:#c9852d;stroke-width:2;rx:10}.text{font:650 22px system-ui,-apple-system,Segoe UI,sans-serif;fill:#1f2a24}.small{font:500 16px system-ui,-apple-system,Segoe UI,sans-serif;fill:#4d5a52}.tiny{font:500 13px system-ui,-apple-system,Segoe UI,sans-serif;fill:#66736c}.line{stroke:#2f5d50;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1120" height="600"/>
  <text x="48" y="54" class="text">OpenVLA: VLM as an action-token policy</text>
  <text x="48" y="82" class="small">Self-drawn guide for OpenVLA Figure 1 and Section 3.2.</text>

  <rect x="52" y="150" width="176" height="82" class="box"/><text x="82" y="184" class="text">RGB image</text><text x="82" y="210" class="small">single view</text>
  <rect x="52" y="330" width="176" height="82" class="box"/><text x="82" y="364" class="text">Instruction</text><text x="82" y="390" class="small">text tokens</text>

  <rect x="296" y="120" width="226" height="142" class="main"/><text x="330" y="158" class="text">Vision encoder</text><text x="330" y="190" class="small">DINOv2 + SigLIP</text><text x="330" y="218" class="small">concatenated features</text>
  <rect x="296" y="330" width="226" height="82" class="box"/><text x="330" y="364" class="text">Tokenizer</text><text x="330" y="390" class="small">language tokens</text>

  <rect x="596" y="160" width="178" height="78" class="box"/><text x="634" y="194" class="text">Projector</text><text x="634" y="220" class="small">to LM space</text>
  <rect x="596" y="300" width="178" height="122" class="main"/><text x="630" y="338" class="text">Llama 2 7B</text><text x="630" y="368" class="small">next-token</text><text x="630" y="394" class="small">prediction</text>

  <rect x="850" y="110" width="220" height="120" class="tok"/><text x="882" y="148" class="text">Action bins</text><text x="882" y="178" class="small">256 per dimension</text><text x="882" y="204" class="small">1%-99% quantiles</text>
  <rect x="850" y="288" width="220" height="120" class="tok"/><text x="882" y="326" class="text">Action tokens</text><text x="882" y="356" class="small">last 256 Llama tokens</text><text x="882" y="382" class="small">decode to 7-DoF</text>

  <path d="M228 190 C256 190 266 190 296 190" class="line"/>
  <path d="M522 190 C554 190 566 198 596 198" class="line"/>
  <path d="M228 370 C260 370 268 370 296 370" class="line"/>
  <path d="M522 370 C554 370 566 360 596 360" class="line"/>
  <path d="M774 360 C814 360 824 348 850 348" class="line"/>
  <path d="M960 230 C960 252 960 266 960 288" class="line"/>

  <text x="52" y="520" class="tiny">Key reading point: continuous control is converted into language-token prediction, so action stats and unnormalization are part of the model contract.</text>
</svg>
