<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="580" viewBox="0 0 1120 580" role="img" aria-labelledby="title desc">
  <title id="title">LIBERO evaluation pipeline</title>
  <desc id="desc">A diagram corresponding to LIBERO Figure 2 and task suite evaluation.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#2f5d50"/></marker>
    <style>
      .bg{fill:#fffdf8}.box{fill:#fff;stroke:#9ab5aa;stroke-width:2;rx:10}.main{fill:#eaf3f0;stroke:#2f5d50;stroke-width:2;rx:14}.metric{fill:#fff4de;stroke:#c9852d;stroke-width:2;rx:10}.text{font:650 22px system-ui,-apple-system,Segoe UI,sans-serif;fill:#1f2a24}.small{font:500 16px system-ui,-apple-system,Segoe UI,sans-serif;fill:#4d5a52}.tiny{font:500 13px system-ui,-apple-system,Segoe UI,sans-serif;fill:#66736c}.line{stroke:#2f5d50;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1120" height="580"/>
  <text x="48" y="54" class="text">LIBERO: success is a protocol, not a demo video</text>
  <text x="48" y="82" class="small">Self-drawn guide for Figure 2 and task suite tables.</text>

  <rect x="52" y="142" width="200" height="104" class="box"/><text x="82" y="180" class="text">Activity</text><text x="82" y="210" class="small">template</text>
  <rect x="310" y="142" width="200" height="104" class="box"/><text x="340" y="180" class="text">Language</text><text x="340" y="210" class="small">instruction</text>
  <rect x="568" y="142" width="200" height="104" class="main"/><text x="598" y="180" class="text">BDDL / PDDL</text><text x="598" y="210" class="small">init + goals</text>
  <rect x="826" y="142" width="200" height="104" class="box"/><text x="856" y="180" class="text">Robosuite</text><text x="856" y="210" class="small">scene rollout</text>

  <rect x="190" y="354" width="220" height="112" class="box"/><text x="222" y="392" class="text">Policy</text><text x="222" y="422" class="small">VLA / BC / baseline</text>
  <rect x="506" y="354" width="220" height="112" class="metric"/><text x="538" y="392" class="text">Predicates</text><text x="538" y="422" class="small">terminal success</text>
  <rect x="822" y="354" width="220" height="112" class="metric"/><text x="854" y="392" class="text">Metrics</text><text x="854" y="422" class="small">SR, transfer, forgetting</text>

  <path d="M252 194 C278 194 284 194 310 194" class="line"/>
  <path d="M510 194 C536 194 542 194 568 194" class="line"/>
  <path d="M768 194 C794 194 800 194 826 194" class="line"/>
  <path d="M926 246 C900 306 760 346 726 410" class="line"/>
  <path d="M410 410 C444 410 472 410 506 410" class="line"/>
  <path d="M726 410 C760 410 788 410 822 410" class="line"/>

  <text x="52" y="530" class="tiny">Key reading point: write both the paper suite name and the code env.task name when comparing success rates.</text>
</svg>
