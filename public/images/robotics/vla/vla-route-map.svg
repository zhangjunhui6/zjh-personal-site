<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Robot VLA route map</title>
  <desc id="desc">A visual map of VLA inputs, action routes, datasets, evaluation, fine-tuning, and humanoid systems.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2f5d50"/>
    </marker>
    <style>
      .bg{fill:#fffdf8}.panel{fill:#f7f3e8;stroke:#d8d0bd;stroke-width:2}.box{fill:#ffffff;stroke:#9ab5aa;stroke-width:2;rx:10}.accent{fill:#eaf3f0;stroke:#2f5d50;stroke-width:2;rx:10}.warn{fill:#fff4de;stroke:#c9852d;stroke-width:2;rx:10}.text{font:600 22px system-ui, -apple-system, Segoe UI, sans-serif;fill:#1f2a24}.small{font:500 16px system-ui, -apple-system, Segoe UI, sans-serif;fill:#4d5a52}.tiny{font:500 13px system-ui, -apple-system, Segoe UI, sans-serif;fill:#66736c}.line{stroke:#2f5d50;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1120" height="640"/>
  <text x="48" y="54" class="text">Robot VLA reading map</text>
  <text x="48" y="82" class="small">Read every paper through inputs, action representation, data, evaluation, and adaptation.</text>

  <rect x="48" y="122" width="250" height="152" class="panel" rx="14"/>
  <text x="72" y="158" class="text">Inputs</text>
  <rect x="72" y="184" width="190" height="34" class="box"/>
  <text x="92" y="207" class="small">RGB images</text>
  <rect x="72" y="228" width="190" height="34" class="box"/>
  <text x="92" y="251" class="small">Language task</text>

  <rect x="48" y="344" width="250" height="152" class="panel" rx="14"/>
  <text x="72" y="380" class="text">Robot state</text>
  <rect x="72" y="406" width="190" height="34" class="box"/>
  <text x="92" y="429" class="small">Proprioception</text>
  <rect x="72" y="450" width="190" height="34" class="box"/>
  <text x="92" y="473" class="small">History / fps</text>

  <rect x="390" y="200" width="290" height="210" class="accent"/>
  <text x="426" y="242" class="text">VLA policy</text>
  <text x="426" y="276" class="small">Vision-language backbone</text>
  <text x="426" y="306" class="small">Robot data alignment</text>
  <text x="426" y="336" class="small">Action representation</text>
  <text x="426" y="366" class="small">Closed-loop execution</text>

  <path d="M298 198 C338 205 355 230 390 254" class="line"/>
  <path d="M298 420 C340 412 358 385 390 358" class="line"/>

  <rect x="782" y="94" width="286" height="78" class="box"/>
  <text x="810" y="126" class="text">OpenVLA</text>
  <text x="810" y="152" class="small">Discrete action tokens</text>

  <rect x="782" y="206" width="286" height="78" class="box"/>
  <text x="810" y="238" class="text">pi0 / SmolVLA</text>
  <text x="810" y="264" class="small">Flow-matching chunks</text>

  <rect x="782" y="318" width="286" height="78" class="box"/>
  <text x="810" y="350" class="text">LIBERO</text>
  <text x="810" y="376" class="small">Task suites and success</text>

  <rect x="782" y="430" width="286" height="78" class="box"/>
  <text x="810" y="462" class="text">Fine-tuning</text>
  <text x="810" y="488" class="small">LoRA, norm stats, eval</text>

  <rect x="782" y="542" width="286" height="58" class="warn"/>
  <text x="810" y="576" class="text">GR00T humanoids</text>

  <path d="M680 252 C724 206 738 150 782 132" class="line"/>
  <path d="M680 286 C718 272 740 248 782 245" class="line"/>
  <path d="M680 326 C724 336 742 354 782 357" class="line"/>
  <path d="M680 360 C724 402 742 458 782 469" class="line"/>
  <path d="M680 392 C720 486 742 558 782 570" class="line"/>

  <text x="48" y="578" class="tiny">Use this as the series overview: first understand the paper route, then verify selected claims in Docker experiment notes.</text>
</svg>
